<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SmartHome Nita – Premium Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.4/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* Light Mode (Default) */
  :root {
    --bg: #f0f2f5;
    --bg-gradient: linear-gradient(135deg, #e8ecf1 0%, #dce1e8 100%);
    --card: #ffffff;
    --card2: #f8f9fa;
    --card-hover: #f0f2f5;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.12);
    --accent: #0077b6;
    --accent2: #0096c7;
    --on-color: #3bf2ff;
    --off-color: #ff6d6d;
    --text: #1a1a2e;
    --text-light: #4a4a6a;
    --sub: #6c757d;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
    --pending: #e67700;
    --chart-gradient-start: rgba(0,119,182,0.2);
    --chart-gradient-end: rgba(0,119,182,0.02);
    --header-gradient: linear-gradient(135deg, #0077b6, #0096c7);
    --header-text: #ffffff;
    --scrollbar-thumb: #cbd5e0;
    --scrollbar-track: #f1f5f9;
    --badge-bg: #e9ecef;
  }

  /* Dark Mode */
  body.dark {
    --bg: #0B1E2D;
    --bg-gradient: linear-gradient(135deg, #0B1E2D 0%, #06121a 100%);
    --card: #112B3C;
    --card2: #0F2437;
    --card-hover: #1a3a4c;
    --border: rgba(0,174,239,0.15);
    --border-strong: rgba(0,174,239,0.25);
    --accent: #00AEEF;
    --accent2: #00E5FF;
    --on-color: #45caff;
    --off-color: #ff6d6d;
    --text: #E0F4FF;
    --text-light: #b0d4e8;
    --sub: #7BAFC4;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --shadow-hover: 0 8px 32px rgba(0,0,0,0.5);
    --pending: #FFD740;
    --chart-gradient-start: rgba(0,174,239,0.3);
    --chart-gradient-end: rgba(0,174,239,0.05);
    --header-gradient: linear-gradient(135deg, #0D3550, #005F8A);
    --header-text: #E0F4FF;
    --scrollbar-thumb: #1a4a6e;
    --scrollbar-track: #0F2437;
    --badge-bg: rgba(255,255,255,0.1);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-gradient);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
    transition: background 0.3s ease, color 0.3s ease;
  }

  /* Theme Toggle Button */
  .theme-toggle {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 40px;
    padding: 3px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s ease;
  }

  .theme-toggle:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.3);
  }

  .theme-icon {
    font-size: 16px;
    padding: 4px 8px;
    border-radius: 30px;
    transition: all 0.3s ease;
  }

  .theme-icon.active {
    background: rgba(255,255,255,0.3);
    transform: scale(1.1);
  }

  /* Animations */
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.05); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes iconBounce {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2) rotate(5deg); }
  }

  @keyframes glow {
    0%, 100% { box-shadow: 0 0 5px var(--on-color); }
    50% { box-shadow: 0 0 20px var(--on-color); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes themeTransition {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
  }

  /* Header */
  .header {
    background: var(--header-gradient);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
    animation: fadeUp 0.4s ease;
    box-shadow: var(--shadow);
    transition: all 0.3s ease;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .header h1 { 
    font-size: 20px; 
    font-weight: 700;
    color: var(--header-text);
  }
  .sub { 
    font-size: 12px; 
    color: rgba(255,255,255,.7); 
    margin-top: 2px;
  }

  .conn-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 20px;
    background: rgba(0,0,0,.25);
    border: 1px solid rgba(255,255,255,.1);
    cursor: pointer;
  }

  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    transition: all 0.3s;
  }
  .conn-dot.online { background: #00E676; animation: glow 2s infinite; }
  .conn-dot.offline { background: #FF5252; }
  .conn-dot.connecting { background: #FFD740; animation: pulse 0.8s infinite; }

  .clock-row { margin-bottom: 4px; }
  .clock { 
    font-size: 36px; 
    font-weight: 800; 
    letter-spacing: 3px;
    color: var(--header-text);
  }
  .clock-date { 
    font-size: 13px; 
    color: rgba(255,255,255,.75);
  }

  /* Sections */
  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 16px;
    animation: fadeUp 0.5s ease;
    box-shadow: var(--shadow);
    transition: background 0.3s ease, border 0.3s ease, box-shadow 0.3s ease;
  }

  .section:hover {
    box-shadow: var(--shadow-hover);
  }

  .section-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Stats Grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  .stat-card {
    background: var(--card2);
    border-radius: 16px;
    padding: 12px;
    text-align: center;
    border: 1px solid var(--border);
    transition: all 0.3s ease;
  }

  .stat-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
  }

  .stat-value {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent2);
  }

  .stat-label {
    font-size: 10px;
    color: var(--sub);
    margin-top: 4px;
  }

  /* Relay Grid */
  .relay-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
  }

  .relay-card {
    background: var(--card2);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 16px;
    transition: all 0.3s ease;
  }

  .relay-card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
  }

  .relay-card.active {
    border-color: var(--on-color);
    background: linear-gradient(135deg, var(--card2), var(--chart-gradient-start));
  }

  .relay-card.off {
    border-color: var(--off-color);
  }

  .relay-icon {
    font-size: 48px;
    text-align: center;
    margin-bottom: 10px;
    transition: all 0.3s;
  }

  .relay-icon.animate {
    animation: iconBounce 0.5s ease;
  }

  .relay-name {
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 8px;
  }

  .relay-status {
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    padding: 4px;
    border-radius: 20px;
    margin: 8px 0;
  }

  .relay-status.on {
    color: var(--on-color);
    background: rgba(0,230,118,0.1);
  }

  .relay-status.off {
    color: var(--off-color);
    background: rgba(255,82,82,0.1);
  }

  /* Duration Bar */
  .duration-bar-container {
    margin: 10px 0;
    background: rgba(0,0,0,0.1);
    border-radius: 10px;
    overflow: hidden;
    height: 6px;
  }

  body.dark .duration-bar-container {
    background: rgba(255,255,255,0.1);
  }

  .duration-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 10px;
    width: 0%;
    transition: width 0.3s ease;
  }

  .duration-text {
    font-size: 10px;
    color: var(--sub);
    text-align: center;
    margin-top: 4px;
  }

  /* Buttons */
  .btn-group {
    display: flex;
    gap: 10px;
    margin: 12px 0;
  }

  button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  button:active { transform: scale(0.95); }

  .btn-on {
    background: linear-gradient(135deg, #4cb3db, #00b7ff);
    color: white;
  }

  .btn-off {
    background: linear-gradient(135deg, #ec5252, #f31c1c);
    color: white;
  }

  .btn-on:hover, .btn-off:hover {
    filter: brightness(1.1);
    transform: translateY(-2px);
  }

  .timer-row {
    display: flex;
    gap: 8px;
    margin: 10px 0;
  }

  .timer-row input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 12px;
    padding: 8px;
    text-align: center;
    transition: all 0.3s ease;
  }

  .timer-row input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .btn-timer {
    background: linear-gradient(135deg, #448fe4, #0077ff);
    color: white;
    padding: 8px 16px;
  }

  .timer-countdown {
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--pending);
    margin-top: 8px;
    padding: 6px;
    background: rgba(255,215,64,0.1);
    border-radius: 10px;
  }

  /* Schedule Section */
  .schedule-list {
    max-height: 300px;
    overflow-y: auto;
  }

  .schedule-item {
    background: var(--badge-bg);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    animation: slideIn 0.3s ease;
    border-left: 4px solid var(--accent);
    transition: all 0.3s ease;
  }

  .schedule-item:hover {
    transform: translateX(4px);
  }

  .schedule-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .schedule-time {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent2);
  }

  .schedule-details {
    font-size: 11px;
    color: var(--sub);
  }

  .schedule-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 600;
    margin-left: 6px;
  }

  .badge-on {
    background: rgba(0,230,118,0.2);
    color: var(--on-color);
  }

  .badge-off {
    background: rgba(255,82,82,0.2);
    color: var(--off-color);
  }

  .badge-repeat {
    background: rgba(0,174,239,0.2);
    color: var(--accent);
  }

  .btn-delete-schedule {
    background: rgba(255,82,82,0.2);
    border: 1px solid var(--off-color);
    color: var(--off-color);
    padding: 6px 12px;
    font-size: 11px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-delete-schedule:hover {
    background: var(--off-color);
    color: white;
  }

  /* Add Schedule Form */
  .add-schedule {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .schedule-form-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .schedule-form-row input, .schedule-form-row select {
    flex: 1;
    padding: 8px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 12px;
    transition: all 0.3s ease;
  }

  .schedule-form-row input:focus, .schedule-form-row select:focus {
    outline: none;
    border-color: var(--accent);
  }

  .schedule-device-select {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .schedule-device-select label {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    padding: 6px 12px;
    background: var(--badge-bg);
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .schedule-device-select label:hover {
    background: var(--accent);
    color: white;
  }

  .repeat-option {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    padding: 8px;
    background: var(--badge-bg);
    border-radius: 10px;
  }

  .repeat-option label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    cursor: pointer;
  }

  .btn-add-schedule {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    padding: 10px;
    width: 100%;
    margin-top: 8px;
  }

  /* Chart Container */
  .chart-container {
    background: var(--card2);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
    transition: all 0.3s ease;
  }

  canvas {
    max-height: 250px;
    width: 100%;
  }

  /* Logs */
  .log-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    animation: slideIn 0.3s ease;
  }

  .log-msg { font-weight: 600; margin-bottom: 3px; }
  .log-meta { color: var(--sub); font-size: 10px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 16px;
    right: 16px;
    background: var(--card);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 30px;
    text-align: center;
    font-size: 13px;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    box-shadow: var(--shadow);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 20px;
    color: var(--sub);
    font-size: 12px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar {
    width: 6px;
  }
  ::-webkit-scrollbar-track {
    background: var(--scrollbar-track);
    border-radius: 10px;
  }
  ::-webkit-scrollbar-thumb {
    background: var(--scrollbar-thumb);
    border-radius: 10px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--accent);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>🏡 SmartHome Control</h1>
      <div class="sub">Dashboard</div>
    </div>
    <div style="display: flex; gap: 10px;">
      <div class="theme-toggle" onclick="toggleTheme()">
        <span class="theme-icon" id="lightIcon">☀️</span>
        <span class="theme-icon" id="darkIcon">🌙</span>
      </div>
      <div class="conn-badge" onclick="testConnection()">
        <span class="conn-dot connecting" id="connDot"></span>
        <span id="connText">Menghubungkan...</span>
      </div>
    </div>
  </div>
  <div class="clock-row">
    <div class="clock" id="clockEl">--:--</div>
    <div class="clock-date" id="dateEl">--</div>
  </div>
</div>

<!-- Statistics -->
<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-value" id="totalSchedules">0</div>
    <div class="stat-label">Total Jadwal Aktif</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="repeatSchedules">0</div>
    <div class="stat-label">Jadwal Berulang</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="activeRelays">0</div>
    <div class="stat-label">Perangkat ON</div>
  </div>
</div>

<!-- Relay Control -->
<div class="section">
  <div class="section-title">🎮 Kontrol Perangkat</div>
  <div class="relay-grid" id="relayGrid"></div>
</div>

<!-- Duration Chart -->
<div class="chart-container">
  <div class="section-title">📊 Durasi Penggunaan Perangkat (Hari Ini)</div>
  <canvas id="durationChart"></canvas>
</div>

<!-- Schedule Section -->
<div class="section">
  <div class="section-title">⏰ Penjadwalan Otomatis</div>
  <div id="scheduleList" class="schedule-list"></div>
  
  <div class="add-schedule">
    <div class="schedule-form-row">
      <input type="time" id="scheduleTime" step="60">
      <select id="scheduleAction">
        <option value="ON">🔵 ON (Nyalakan)</option>
        <option value="OFF">🔴 OFF (Matikan)</option>
      </select>
    </div>
    <div class="schedule-device-select" id="scheduleDevices">
      <label><input type="checkbox" value="0"> ❄️ Kipas</label>
      <label><input type="checkbox" value="1"> 📺 TV</label>
      <label><input type="checkbox" value="2"> 📱 Charger</label>
      <label><input type="checkbox" value="3"> 💡 Lampu</label>
    </div>
    <div class="repeat-option">
      <label>
        <input type="checkbox" id="scheduleRepeat">
        🔄 Jadwal berulang setiap hari
      </label>
    </div>
    <button class="btn-add-schedule" onclick="addSchedule()">➕ Tambah Jadwal</button>
  </div>
</div>

<!-- Log Section -->
<div class="section">
  <div class="section-title">📋 Log Aktivitas</div>
  <div id="logContainer"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== THEME MANAGEMENT =====
function initTheme() {
  const savedTheme = localStorage.getItem('smarthome_theme');
  if (savedTheme === 'dark') {
    document.body.classList.add('dark');
    document.getElementById('darkIcon').classList.add('active');
    document.getElementById('lightIcon').classList.remove('active');
  } else {
    document.body.classList.remove('dark');
    document.getElementById('lightIcon').classList.add('active');
    document.getElementById('darkIcon').classList.remove('active');
  }
}

function toggleTheme() {
  const isDark = document.body.classList.toggle('dark');
  if (isDark) {
    localStorage.setItem('smarthome_theme', 'dark');
    document.getElementById('darkIcon').classList.add('active');
    document.getElementById('lightIcon').classList.remove('active');
    showToast('🌙 Mode Gelap aktif');
  } else {
    localStorage.setItem('smarthome_theme', 'light');
    document.getElementById('lightIcon').classList.add('active');
    document.getElementById('darkIcon').classList.remove('active');
    showToast('☀️ Mode Terang aktif');
  }
  
  // Update chart colors when theme changes
  if (durationChart) {
    updateChartTheme();
  }
}

function updateChartTheme() {
  const isDark = document.body.classList.contains('dark');
  const textColor = isDark ? '#E0F4FF' : '#1a1a2e';
  const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
  
  durationChart.options.plugins.legend.labels.color = textColor;
  durationChart.options.scales.y.ticks.color = textColor;
  durationChart.options.scales.x.ticks.color = textColor;
  durationChart.options.scales.y.grid.color = gridColor;
  durationChart.options.scales.x.grid.color = gridColor;
  durationChart.update();
}

// ===== MQTT CONFIG =====
const MQTT_HOST = "2dce4d575dbb4cd0b98e0dfddf167d78.s1.eu.hivemq.cloud";
const MQTT_PORT = 8884;
const MQTT_USER = "esp32rumah";
const MQTT_PASS = "Nita1816";

const TOPIC_STATUS = "smarthome/nita/status";
const TOPIC_CONTROL = "smarthome/nita/control";
const TOPIC_LOG = "smarthome/nita/log";

// ===== DATA =====
const relayNames = ["Kipas Angin", "TV", "Charger HP", "Lampu"];
const relayIcons = ["❄️", "📺", "📱", "💡"];

let relayState = [false, false, false, false];
let relayTimer = [0, 0, 0, 0];
let timerIntervals = [null, null, null, null];
let logs = [];
let client = null;

// Duration tracking (in seconds)
let relayStartTime = [null, null, null, null];
let relayDuration = [0, 0, 0, 0];
let durationChart = null;

// Schedule Data
let schedules = [];

// Load schedules from localStorage
function loadSchedules() {
  const saved = localStorage.getItem('smarthome_schedules_v2');
  if (saved) {
    schedules = JSON.parse(saved);
  }
  renderSchedules();
  updateStats();
}

// Save schedules to localStorage
function saveSchedules() {
  localStorage.setItem('smarthome_schedules_v2', JSON.stringify(schedules));
  renderSchedules();
  updateStats();
}

// Update statistics
function updateStats() {
  document.getElementById('totalSchedules').textContent = schedules.length;
  document.getElementById('repeatSchedules').textContent = schedules.filter(s => s.repeat).length;
  document.getElementById('activeRelays').textContent = relayState.filter(s => s).length;
}

// Check and execute schedules
function checkSchedules() {
  const now = new Date();
  const currentTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  
  schedules.forEach(schedule => {
    if (schedule.time === currentTime) {
      schedule.devices.forEach(deviceId => {
        const cmd = `CH${deviceId}:${schedule.action}`;
        sendCmd(cmd, false);
        addLog(`${relayNames[deviceId]} ${schedule.action === 'ON' ? 'dinyalakan' : 'dimatikan'} (Jadwal: ${schedule.time}${schedule.repeat ? ' - Berulang' : ''})`, "Jadwal");
      });
    }
  });
}

// Add new schedule
function addSchedule() {
  const timeInput = document.getElementById('scheduleTime');
  const action = document.getElementById('scheduleAction').value;
  const checkboxes = document.querySelectorAll('#scheduleDevices input:checked');
  const repeat = document.getElementById('scheduleRepeat').checked;
  
  if (!timeInput.value) {
    showToast('❌ Pilih waktu terlebih dahulu');
    return;
  }
  
  if (checkboxes.length === 0) {
    showToast('❌ Pilih minimal satu perangkat');
    return;
  }
  
  const devices = Array.from(checkboxes).map(cb => parseInt(cb.value));
  
  const newSchedule = {
    id: Date.now(),
    time: timeInput.value,
    action: action,
    devices: devices,
    repeat: repeat,
    createdAt: new Date().toLocaleDateString('id-ID')
  };
  
  schedules.push(newSchedule);
  saveSchedules();
  
  timeInput.value = '';
  checkboxes.forEach(cb => cb.checked = false);
  document.getElementById('scheduleRepeat').checked = false;
  
  showToast(`✅ Jadwal ditambahkan: ${action} pukul ${newSchedule.time}${repeat ? ' (Berulang setiap hari)' : ' (Sekali)'}`);
}

// Delete schedule
function deleteSchedule(id) {
  schedules = schedules.filter(s => s.id !== id);
  saveSchedules();
  showToast('🗑️ Jadwal dihapus');
}

// Render schedules list
function renderSchedules() {
  const container = document.getElementById('scheduleList');
  
  if (schedules.length === 0) {
    container.innerHTML = '<div class="empty-state">📭 Belum ada jadwal. Tambahkan jadwal di atas!</div>';
    return;
  }
  
  container.innerHTML = schedules.map(schedule => `
    <div class="schedule-item">
      <div class="schedule-info">
        <div class="schedule-time">
          ⏰ ${schedule.time}
          <span class="schedule-badge ${schedule.action === 'ON' ? 'badge-on' : 'badge-off'}">
            ${schedule.action === 'ON' ? '🔵 NYALAKAN' : '🔴 MATIKAN'}
          </span>
          ${schedule.repeat ? '<span class="schedule-badge badge-repeat">🔄 Berulang Setiap Hari</span>' : '<span class="schedule-badge">📅 Sekali</span>'}
        </div>
        <div class="schedule-details">
          📱 Perangkat: ${schedule.devices.map(d => relayNames[d]).join(', ')}
          ${!schedule.repeat ? `<br>📅 Dibuat: ${schedule.createdAt}` : ''}
        </div>
      </div>
      <button class="btn-delete-schedule" onclick="deleteSchedule(${schedule.id})">🗑️ Hapus</button>
    </div>
  `).join('');
}

// Duration tracking functions
function startDurationTracking(relayIndex) {
  if (relayStartTime[relayIndex] === null) {
    relayStartTime[relayIndex] = Date.now();
  }
}

function stopDurationTracking(relayIndex) {
  if (relayStartTime[relayIndex] !== null) {
    const duration = (Date.now() - relayStartTime[relayIndex]) / 1000;
    relayDuration[relayIndex] += duration;
    relayStartTime[relayIndex] = null;
    updateDurationChart();
  }
}

function resetDailyDuration() {
  const lastReset = localStorage.getItem('lastDurationReset');
  const today = new Date().toLocaleDateString();
  if (lastReset !== today) {
    relayDuration = [0, 0, 0, 0];
    localStorage.setItem('lastDurationReset', today);
    localStorage.setItem('relayDuration', JSON.stringify(relayDuration));
    updateDurationChart();
    updateAllDurationDisplays();
  } else {
    const saved = localStorage.getItem('relayDuration');
    if (saved) {
      relayDuration = JSON.parse(saved);
    }
  }
}

function saveDuration() {
  localStorage.setItem('relayDuration', JSON.stringify(relayDuration));
}

function updateDurationChart() {
  if (durationChart) {
    durationChart.data.datasets[0].data = relayDuration.map(d => Number((d / 60).toFixed(1)));
    durationChart.update();
  }
  saveDuration();
}

function updateAllDurationDisplays() {
  for (let i = 0; i < 4; i++) {
    updateDurationDisplay(i);
  }
}

function updateDurationDisplay(i) {
  const minutes = Math.floor(relayDuration[i] / 60);
  const seconds = Math.floor(relayDuration[i] % 60);
  const percent = Math.min((relayDuration[i] / 3600 * 100), 100);
  
  const barEl = document.getElementById(`durationBar${i}`);
  const textEl = document.getElementById(`durationText${i}`);
  
  if (barEl) barEl.style.width = `${percent}%`;
  if (textEl) textEl.textContent = `Total ON hari ini: ${minutes} menit ${seconds} detik`;
}

// Initialize duration chart
function initDurationChart() {
  const ctx = document.getElementById('durationChart').getContext('2d');
  const isDark = document.body.classList.contains('dark');
  const textColor = isDark ? '#E0F4FF' : '#1a1a2e';
  const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
  
  durationChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: relayNames,
      datasets: [{
        label: 'Durasi Penggunaan (menit)',
        data: relayDuration.map(d => Number((d / 60).toFixed(1))),
        backgroundColor: 'rgba(0,174,239,0.6)',
        borderColor: '#00AEEF',
        borderWidth: 1,
        borderRadius: 8,
        barPercentage: 0.6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: {
          labels: { color: textColor }
        },
        tooltip: {
          callbacks: {
            label: function(context) {
              const minutes = context.raw;
              const hours = minutes / 60;
              if (hours >= 1) {
                return `${minutes} menit (${hours.toFixed(2)} jam)`;
              }
              return `${minutes} menit`;
            }
          }
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          title: {
            display: true,
            text: 'Menit',
            color: textColor
          },
          grid: { color: gridColor },
          ticks: { color: textColor }
        },
        x: {
          grid: { color: gridColor },
          ticks: { color: textColor }
        }
      }
    }
  });
}

// ===== UI FUNCTIONS =====
function renderRelayGrid() {
  const grid = document.getElementById('relayGrid');
  grid.innerHTML = relayNames.map((name, i) => `
    <div class="relay-card ${relayState[i] ? 'active' : 'off'}" id="card${i}">
      <div class="relay-icon" id="icon${i}">${relayIcons[i]}</div>
      <div class="relay-name">${name}</div>
      <div class="relay-status ${relayState[i] ? 'on' : 'off'}" id="rstatus${i}">
        ${relayState[i] ? '● ON' : '○ OFF'}
      </div>
      <div class="duration-bar-container">
        <div class="duration-bar" id="durationBar${i}" style="width: ${(relayDuration[i] / 3600 * 100)}%"></div>
      </div>
      <div class="duration-text" id="durationText${i}">
        Total ON hari ini: ${Math.floor(relayDuration[i] / 60)} menit ${Math.floor(relayDuration[i] % 60)} detik
      </div>
      <div class="btn-group">
        <button class="btn-on" onclick="sendCmd('CH${i}:ON')">🔵 ON</button>
        <button class="btn-off" onclick="sendCmd('CH${i}:OFF')">🔴 OFF</button>
      </div>
      <div class="timer-row">
        <input id="timerInput${i}" type="number" placeholder="Menit" min="1" max="999">
        <button class="btn-timer" onclick="sendTimer(${i})">⏱ Set Timer</button>
      </div>
      <div class="timer-countdown" id="countdown${i}"></div>
    </div>
  `).join('');
}

function updateRelayUI(i, state, timerSec) {
  const oldState = relayState[i];
  relayState[i] = state;
  relayTimer[i] = timerSec;
  
  const card = document.getElementById(`card${i}`);
  const statusEl = document.getElementById(`rstatus${i}`);
  const iconEl = document.getElementById(`icon${i}`);
  
  // Track duration
  if (state && !oldState) {
    startDurationTracking(i);
    if (iconEl) iconEl.classList.add('animate');
    setTimeout(() => iconEl.classList.remove('animate'), 500);
  } else if (!state && oldState) {
    stopDurationTracking(i);
  }
  
  // Update card style
  if (state) {
    card.classList.add('active');
    card.classList.remove('off');
    statusEl.className = 'relay-status on';
    statusEl.textContent = '● ON';
  } else {
    card.classList.remove('active');
    card.classList.add('off');
    statusEl.className = 'relay-status off';
    statusEl.textContent = '○ OFF';
  }
  
  updateDurationDisplay(i);
  updateStats();
  
  // Timer countdown display
  if (timerIntervals[i]) clearInterval(timerIntervals[i]);
  if (timerSec > 0) {
    let remaining = timerSec;
    const el = document.getElementById(`countdown${i}`);
    const updateTimer = () => {
      if (remaining <= 0) {
        el.textContent = '';
        clearInterval(timerIntervals[i]);
        timerIntervals[i] = null;
      } else {
        const m = Math.floor(remaining / 60);
        const s = remaining % 60;
        el.textContent = `⏱️ Timer: ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        remaining--;
      }
    };
    updateTimer();
    timerIntervals[i] = setInterval(updateTimer, 1000);
  } else {
    document.getElementById(`countdown${i}`).textContent = '';
  }
}

function renderLogs() {
  const container = document.getElementById('logContainer');
  if (logs.length === 0) {
    container.innerHTML = '<div class="empty-state">📭 Belum ada aktivitas</div>';
    return;
  }
  container.innerHTML = logs.slice(0, 15).map(l => `
    <div class="log-item">
      <div class="log-msg">📌 ${l.message}</div>
      <div class="log-meta">👤 ${l.source} · ⏱️ ${l.time}</div>
    </div>
  `).join('');
}

function addLog(message, source) {
  const now = new Date();
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  logs.unshift({ message, source, time: timeStr });
  if (logs.length > 20) logs.pop();
  renderLogs();
}

function sendCmd(cmd, showNotif = true) {
  if (!client || !client.connected) {
    showToast('⚠️ Tidak terhubung ke broker');
    return;
  }
  client.publish(TOPIC_CONTROL, cmd);
  if (showNotif) {
    showToast('📤 Perintah dikirim: ' + cmd);
  }
}

function sendTimer(i) {
  const input = document.getElementById(`timerInput${i}`);
  const minutes = parseInt(input.value);
  if (!minutes || minutes <= 0) {
    showToast('Masukkan menit yang valid (1-999)');
    return;
  }
  sendCmd(`CH${i}:TIMER:${minutes}`);
  input.value = '';
  showToast(`⏱️ Timer ${minutes} menit untuk ${relayNames[i]}`);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.opacity = '1';
  setTimeout(() => toast.style.opacity = '0', 2500);
}

function testConnection() {
  if (client && client.connected) {
    showToast('✅ Koneksi MQTT sehat');
  } else {
    showToast('⚠️ Koneksi terputus, mencoba reconnect...');
    connectMQTT();
  }
}

function setConnStatus(status) {
  const dot = document.getElementById('connDot');
  const text = document.getElementById('connText');
  dot.className = `conn-dot ${status}`;
  if (status === 'online') {
    text.textContent = 'Terhubung';
  } else if (status === 'offline') {
    text.textContent = 'Terputus';
  } else {
    text.textContent = 'Menghubungkan...';
  }
}

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clockEl').textContent = 
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  document.getElementById('dateEl').textContent = 
    days[now.getDay()] + ', ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
}
setInterval(updateClock, 1000);
updateClock();

// Update duration display every second
setInterval(() => {
  for (let i = 0; i < 4; i++) {
    if (relayState[i] && relayStartTime[i] !== null) {
      const currentDuration = (Date.now() - relayStartTime[i]) / 1000;
      const baseDuration = parseFloat(localStorage.getItem(`relayDuration_${i}`)) || 0;
      relayDuration[i] = baseDuration + currentDuration;
      updateDurationDisplay(i);
      updateDurationChart();
    }
  }
}, 1000);

// Check schedules every minute
setInterval(() => {
  checkSchedules();
}, 60000);

// Reset duration at midnight
setInterval(() => {
  resetDailyDuration();
}, 60000);

// MQTT Connect
function connectMQTT() {
  setConnStatus('connecting');
  const url = `wss://${MQTT_HOST}:${MQTT_PORT}/mqtt`;
  
  client = mqtt.connect(url, {
    clientId: 'WebDash-' + Math.random().toString(16).substr(2, 8),
    username: MQTT_USER,
    password: MQTT_PASS,
    clean: true,
    reconnectPeriod: 4000,
    connectTimeout: 10000,
  });
  
  client.on('connect', () => {
    setConnStatus('online');
    showToast('✅ Terhubung ke HiveMQ Cloud');
    client.subscribe(TOPIC_STATUS);
    client.subscribe(TOPIC_LOG);
  });
  
  client.on('message', (topic, payload) => {
    const msg = payload.toString();
    try {
      const data = JSON.parse(msg);
      if (topic === TOPIC_STATUS && data.relays) {
        data.relays.forEach((r, i) => {
          updateRelayUI(i, r.state, r.timer || 0);
        });
      }
      if (topic === TOPIC_LOG && data.message) {
        addLog(data.message, data.source || 'Sistem');
      }
    } catch(e) {
      console.warn('Parse error:', e);
    }
  });
  
  client.on('offline', () => setConnStatus('offline'));
  client.on('error', (err) => {
    console.error('MQTT Error:', err);
    setConnStatus('offline');
  });
}

// ===== INIT =====
initTheme();
renderRelayGrid();
initDurationChart();
loadSchedules();
resetDailyDuration();
connectMQTT();
</script>
</body>
