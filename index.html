<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SmartHome Nita – Remote Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.4/mqtt.min.js"></script>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg:        #0B1E2D;
    --card:      #112B3C;
    --card2:     #0F2437;
    --border:    rgba(0,174,239,0.15);
    --accent:    #00AEEF;
    --accent2:   #00E5FF;
    --on-color:  #00E676;
    --off-color: #FF5252;
    --text:      #E0F4FF;
    --sub:       #7BAFC4;
    --shadow:    0 4px 24px rgba(0,0,0,0.4);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }

  @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:0.5} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes spin   { to{transform:rotate(360deg)} }
  @keyframes glow   { 0%,100%{box-shadow:0 0 6px var(--on-color)} 50%{box-shadow:0 0 18px var(--on-color)} }

  /* ===== HEADER ===== */
  .header {
    background: linear-gradient(135deg, #0D3550, #005F8A);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
    position: relative;
    animation: fadeUp .4s ease;
    box-shadow: var(--shadow);
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: .3px; }
  .header .sub { font-size: 12px; color: rgba(255,255,255,.7); margin-top: 2px; }

  .conn-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 20px;
    background: rgba(0,0,0,.25);
    border: 1px solid rgba(255,255,255,.1);
    white-space: nowrap;
  }

  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #888;
    transition: background .3s;
  }
  .conn-dot.online  { background: var(--on-color);  animation: glow 2s infinite; }
  .conn-dot.offline { background: var(--off-color); }
  .conn-dot.connecting { background: #FFD740; animation: pulse .8s infinite; }

  .clock-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 4px; }
  .clock { font-size: 36px; font-weight: 800; letter-spacing: 3px; }
  .clock-date { font-size: 13px; color: rgba(255,255,255,.75); }

  .info-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  .info-pill {
    background: rgba(255,255,255,.12);
    border-radius: 30px;
    padding: 4px 12px;
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* ===== SECTION ===== */
  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 16px;
    animation: fadeUp .5s ease;
    box-shadow: var(--shadow);
  }

  .section-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ===== RELAY CARDS ===== */
  .relay-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  @media(min-width:520px) {
    .relay-grid { grid-template-columns: repeat(4, 1fr); }
  }

  .relay-card {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transition: border-color .3s, box-shadow .3s;
  }

  .relay-card.active {
    border-color: var(--on-color);
    box-shadow: 0 0 12px rgba(0,230,118,.2);
  }

  .relay-icon { font-size: 28px; line-height: 1; }
  .relay-name { font-size: 11px; font-weight: 600; color: var(--sub); text-align: center; }

  .relay-status {
    font-size: 12px;
    font-weight: 700;
    padding: 3px 12px;
    border-radius: 20px;
    background: rgba(255,82,82,.15);
    color: var(--off-color);
    transition: all .3s;
  }

  .relay-status.on {
    background: rgba(0,230,118,.15);
    color: var(--on-color);
    animation: pulse 1.8s infinite;
  }

  .relay-btns {
    display: flex;
    gap: 6px;
    width: 100%;
  }

  .relay-btns button {
    flex: 1;
    padding: 7px 4px;
    border: none;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
  }

  .relay-btns button:active { transform: scale(.95); }
  .relay-btns .b-on  { background: rgba(0,174,239,.2); color: var(--accent2); border: 1px solid rgba(0,174,239,.4); }
  .relay-btns .b-off { background: rgba(255,82,82,.15); color: var(--off-color); border: 1px solid rgba(255,82,82,.3); }
  .relay-btns .b-on:hover  { background: rgba(0,174,239,.35); }
  .relay-btns .b-off:hover { background: rgba(255,82,82,.3); }

  .timer-row {
    display: flex;
    gap: 6px;
    width: 100%;
    margin-top: 2px;
  }

  .timer-row input {
    flex: 1;
    background: rgba(255,255,255,.06);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 11px;
    padding: 6px 6px;
    text-align: center;
    min-width: 0;
  }

  .timer-row input:focus { outline: none; border-color: var(--accent); }

  .timer-row button {
    padding: 6px 10px;
    background: rgba(0,174,239,.15);
    border: 1px solid rgba(0,174,239,.3);
    border-radius: 10px;
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: all .2s;
  }

  .timer-row button:hover { background: rgba(0,174,239,.3); }

  .timer-countdown {
    font-size: 10px;
    color: #FFD740;
    min-height: 14px;
    text-align: center;
  }

  /* ===== ALL CONTROL ===== */
  .all-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }

  .all-row button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
  }

  .all-on  { background: rgba(0,230,118,.2); color: var(--on-color);  border: 1px solid rgba(0,230,118,.4) !important; }
  .all-off { background: rgba(255,82,82,.15); color: var(--off-color); border: 1px solid rgba(255,82,82,.3) !important; }
  .all-on:hover  { background: rgba(0,230,118,.35); }
  .all-off:hover { background: rgba(255,82,82,.3); }

  /* ===== LOG ===== */
  .log-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }

  .log-item:last-child { border-bottom: none; }
  .log-msg  { font-weight: 600; margin-bottom: 3px; }
  .log-meta { color: var(--sub); font-size: 10px; }

  /* ===== OFFLINE OVERLAY ===== */
  .offline-banner {
    display: none;
    background: rgba(255,82,82,.15);
    border: 1px solid rgba(255,82,82,.35);
    border-radius: 14px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--off-color);
    margin-bottom: 16px;
    text-align: center;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 20px; left: 16px; right: 16px;
    background: #1A3A50;
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 30px;
    text-align: center;
    font-size: 13px;
    z-index: 9999;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
    box-shadow: 0 4px 20px rgba(0,174,239,.3);
  }

  /* ===== SPINNER ===== */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div>
      <h1>🏠 SmartHome Nita</h1>
      <div class="sub">Remote Dashboard · HiveMQ Cloud</div>
    </div>
    <div class="conn-badge">
      <span class="conn-dot connecting" id="connDot"></span>
      <span id="connText">Menghubungkan...</span>
    </div>
  </div>
  <div class="clock-row">
    <div class="clock" id="clockEl">--:--</div>
    <div class="clock-date" id="dateEl">--</div>
  </div>
  <div class="info-row">
    <div class="info-pill">📡 MQTT: HiveMQ Cloud</div>
    <div class="info-pill" id="lastUpdatePill">🕐 Belum ada data</div>
  </div>
</div>

<!-- OFFLINE BANNER -->
<div class="offline-banner" id="offlineBanner">
  ⚠️ Tidak terhubung ke broker MQTT. Pastikan internet aktif dan ESP32 menyala.
</div>

<!-- KONTROL SEMUA -->
<div class="section">
  <div class="section-title">🕹️ Kontrol Perangkat</div>
  <div class="all-row">
    <button class="all-on"  onclick="sendAll('ON')">⚡ Semua ON</button>
    <button class="all-off" onclick="sendAll('OFF')">🔴 Semua OFF</button>
  </div>
  <div class="relay-grid" id="relayGrid">
    <!-- Dirender oleh JS -->
  </div>
</div>

<!-- LOG -->
<div class="section">
  <div class="section-title">📋 Log Aktivitas</div>
  <div id="logContainer">
    <div style="color:var(--sub);font-size:12px;padding:8px 0;">📭 Menunggu data...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== KONFIGURASI MQTT =====
const MQTT_HOST = "2dce4d575dbb4cd0b98e0dfddf167d78.s1.eu.hivemq.cloud";
const MQTT_PORT = 8884; // WebSocket port
const MQTT_USER = "esp32rumah";
const MQTT_PASS = "Nita1816";

const TOPIC_STATUS  = "smarthome/nita/status";
const TOPIC_CONTROL = "smarthome/nita/control";
const TOPIC_LOG     = "smarthome/nita/log";

// ===== STATE =====
const relayNames = ["Kipas Angin", "TV", "Charger HP", "Lampu"];
const relayIcons = ["❄️", "📺", "📱", "💡"];

let relayState = [false, false, false, false];
let relayTimer = [0, 0, 0, 0];
let timerIntervals = [null, null, null, null];
let logs = [];
let client = null;
let clockInterval = null;
let espTime = null; // waktu dari ESP32

// ===== RENDER RELAY CARDS =====
function renderRelayGrid() {
  document.getElementById('relayGrid').innerHTML = relayNames.map((name, i) => `
    <div class="relay-card" id="card${i}">
      <div class="relay-icon">${relayIcons[i]}</div>
      <div class="relay-name">${name}</div>
      <div class="relay-status" id="rstatus${i}">OFF</div>
      <div class="relay-btns">
        <button class="b-on"  onclick="sendCmd('CH${i}:ON')">ON</button>
        <button class="b-off" onclick="sendCmd('CH${i}:OFF')">OFF</button>
      </div>
      <div class="timer-row">
        <input id="timerInput${i}" type="number" inputmode="numeric" placeholder="Menit" min="1" max="999">
        <button onclick="sendTimer(${i})">⏱ Set</button>
      </div>
      <div class="timer-countdown" id="countdown${i}"></div>
    </div>
  `).join('');
}

// ===== UPDATE RELAY UI =====
function updateRelayUI(i, state, timerSec) {
  relayState[i] = state;
  relayTimer[i] = timerSec;

  const card    = document.getElementById('card' + i);
  const statusEl = document.getElementById('rstatus' + i);

  if (state) {
    card.classList.add('active');
    statusEl.className = 'relay-status on';
    statusEl.textContent = 'ON';
  } else {
    card.classList.remove('active');
    statusEl.className = 'relay-status';
    statusEl.textContent = 'OFF';
  }

  // Timer countdown
  if (timerIntervals[i]) clearInterval(timerIntervals[i]);
  if (timerSec > 0) {
    let sisa = timerSec;
    const el = document.getElementById('countdown' + i);
    const tick = () => {
      if (sisa <= 0) {
        el.textContent = '';
        clearInterval(timerIntervals[i]);
        return;
      }
      let m = Math.floor(sisa / 60), s = sisa % 60;
      el.textContent = `⏱ ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      sisa--;
    };
    tick();
    timerIntervals[i] = setInterval(tick, 1000);
  } else {
    document.getElementById('countdown' + i).textContent = '';
  }
}

// ===== RENDER LOG =====
function renderLogs() {
  const c = document.getElementById('logContainer');
  if (logs.length === 0) {
    c.innerHTML = '<div style="color:var(--sub);font-size:12px;padding:8px 0;">📭 Belum ada aktivitas</div>';
    return;
  }
  c.innerHTML = logs.map(l => `
    <div class="log-item">
      <div class="log-msg">📌 ${l.message}</div>
      <div class="log-meta">👤 ${l.source} · ⏱️ ${l.time}</div>
    </div>
  `).join('');
}

// ===== SEND MQTT =====
function sendCmd(cmd) {
  if (!client || !client.connected) {
    showToast('⚠️ Tidak terhubung ke broker');
    return;
  }
  client.publish(TOPIC_CONTROL, cmd);
  showToast('📤 Perintah dikirim: ' + cmd);
}

function sendAll(state) {
  sendCmd('ALL:' + state);
}

function sendTimer(i) {
  const el  = document.getElementById('timerInput' + i);
  const val = parseInt(el.value);
  if (!val || val <= 0) { showToast('Masukkan menit yang valid'); return; }
  sendCmd('CH' + i + ':TIMER:' + val);
  el.value = '';
  showToast('⏱ Timer ' + val + ' menit untuk ' + relayNames[i]);
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 2500);
}

// ===== CONNECTION UI =====
function setConnStatus(status) {
  const dot  = document.getElementById('connDot');
  const text = document.getElementById('connText');
  const banner = document.getElementById('offlineBanner');

  dot.className = 'conn-dot ' + status;

  if (status === 'online') {
    text.textContent = 'Terhubung';
    banner.style.display = 'none';
  } else if (status === 'offline') {
    text.textContent = 'Terputus';
    banner.style.display = 'block';
  } else {
    text.innerHTML = '<span class="spinner"></span>Menghubungkan...';
    banner.style.display = 'none';
  }
}

// ===== CLOCK =====
function startClock() {
  if (clockInterval) clearInterval(clockInterval);
  clockInterval = setInterval(() => {
    const now = new Date();
    document.getElementById('clockEl').textContent =
      String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
    const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
    document.getElementById('dateEl').textContent =
      days[now.getDay()] + ', ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
  }, 1000);
}

// ===== MQTT CONNECT =====
function connectMQTT() {
  setConnStatus('connecting');

  const url = `wss://${MQTT_HOST}:${MQTT_PORT}/mqtt`;

  client = mqtt.connect(url, {
    clientId:  'WebDash-' + Math.random().toString(16).substr(2, 8),
    username:  MQTT_USER,
    password:  MQTT_PASS,
    clean:     true,
    reconnectPeriod: 4000,
    connectTimeout:  10000,
  });

  client.on('connect', () => {
    console.log('MQTT Connected');
    setConnStatus('online');
    showToast('✅ Terhubung ke HiveMQ Cloud');
    client.subscribe(TOPIC_STATUS);
    client.subscribe(TOPIC_LOG);
  });

  client.on('message', (topic, payload) => {
    const msg = payload.toString();
    try {
      const data = JSON.parse(msg);

      if (topic === TOPIC_STATUS) {
        // Update relay status
        if (data.relays) {
          data.relays.forEach((r, i) => {
            updateRelayUI(i, !!r.state, r.timer || 0);
          });
        }
        // Update time dari ESP32
        if (data.time && data.time !== '--:--') {
          document.getElementById('clockEl').textContent = data.time;
        }
        if (data.date && data.date !== '--') {
          document.getElementById('dateEl').textContent = data.date;
        }
        // Last update
        const now = new Date();
        document.getElementById('lastUpdatePill').textContent =
          '🕐 Update: ' + String(now.getHours()).padStart(2,'0') + ':' +
          String(now.getMinutes()).padStart(2,'0') + ':' +
          String(now.getSeconds()).padStart(2,'0');
      }

      if (topic === TOPIC_LOG) {
        logs.unshift({
          message: data.message || '-',
          source:  data.source  || '-',
          time:    data.time    || '--:--:--',
        });
        if (logs.length > 10) logs.pop();
        renderLogs();
      }
    } catch(e) {
      console.warn('Parse error:', e);
    }
  });

  client.on('offline',    () => { setConnStatus('offline'); showToast('⚠️ Koneksi MQTT terputus'); });
  client.on('reconnect',  () => { setConnStatus('connecting'); });
  client.on('error', (err) => { console.error('MQTT Error:', err); setConnStatus('offline'); });
}

// ===== INIT =====
renderRelayGrid();
startClock();
connectMQTT();
</script>
</body>
</html>
