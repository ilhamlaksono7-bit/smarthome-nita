<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SmartHome Nita – Fixed Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.4/mqtt.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0B1E2D;
    --card: #112B3C;
    --card2: #0F2437;
    --border: rgba(0,174,239,0.15);
    --accent: #00AEEF;
    --accent2: #00E5FF;
    --on-color: #00E676;
    --off-color: #FF5252;
    --text: #E0F4FF;
    --sub: #7BAFC4;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --pending: #FFD740;
  }

  body {
    font-family: 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }

  .header {
    background: linear-gradient(135deg, #0D3550, #005F8A);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .clock { font-size: 36px; font-weight: 800; letter-spacing: 3px; }
  .clock-date { font-size: 13px; opacity: 0.8; }

  .conn-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 20px;
    background: rgba(0,0,0,.25);
    cursor: pointer;
  }
  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .conn-dot.online { background: #00E676; animation: glow 1s infinite; }
  .conn-dot.offline { background: #FF5252; }
  .conn-dot.connecting { background: #FFD740; animation: pulse 0.8s infinite; }

  @keyframes glow {
    0%,100% { box-shadow: 0 0 5px #00E676; }
    50% { box-shadow: 0 0 15px #00E676; }
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  @keyframes iconBounce {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }

  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .relay-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
  }
  .relay-card {
    background: var(--card2);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 16px;
    transition: all 0.3s;
  }
  .relay-card.active { border-color: var(--on-color); background: rgba(0,230,118,0.1); }
  .relay-card.off { border-color: var(--off-color); }
  .relay-icon { font-size: 48px; text-align: center; margin-bottom: 10px; }
  .relay-icon.animate { animation: iconBounce 0.3s ease; }
  .relay-name { font-size: 14px; font-weight: 600; text-align: center; }
  .relay-status { text-align: center; font-size: 12px; font-weight: 700; padding: 4px; border-radius: 20px; margin: 8px 0; }
  .relay-status.on { color: var(--on-color); background: rgba(0,230,118,0.2); }
  .relay-status.off { color: var(--off-color); background: rgba(255,82,82,0.2); }

  .btn-group { display: flex; gap: 10px; margin: 12px 0; }
  button { flex: 1; padding: 10px; border: none; border-radius: 12px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  button:active { transform: scale(0.95); }
  .btn-on { background: linear-gradient(135deg, #00E676, #00C853); color: white; }
  .btn-off { background: linear-gradient(135deg, #FF5252, #D32F2F); color: white; }
  .btn-timer { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }

  .timer-row { display: flex; gap: 8px; margin: 10px 0; }
  .timer-row input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 8px; text-align: center; }
  .timer-countdown { text-align: center; font-size: 13px; font-weight: 700; color: var(--pending); margin-top: 8px; padding: 6px; background: rgba(255,215,64,0.1); border-radius: 10px; }

  .schedule-list { max-height: 300px; overflow-y: auto; }
  .schedule-item {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    border-left: 4px solid var(--accent);
  }
  .schedule-time { font-size: 14px; font-weight: 700; color: var(--accent2); }
  .btn-delete-schedule { background: rgba(255,82,82,0.2); border: 1px solid var(--off-color); color: var(--off-color); padding: 6px 12px; border-radius: 8px; cursor: pointer; }
  
  .add-schedule { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
  .schedule-form-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .schedule-form-row input, .schedule-form-row select { flex: 1; padding: 8px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); }
  .schedule-device-select { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  .schedule-device-select label { display: flex; align-items: center; gap: 5px; font-size: 12px; padding: 6px 12px; background: rgba(255,255,255,0.05); border-radius: 20px; cursor: pointer; }
  .repeat-option { margin-bottom: 12px; }
  .btn-add-schedule { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; padding: 10px; width: 100%; }

  .log-item { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .log-msg { font-weight: 600; margin-bottom: 3px; }
  .log-meta { color: var(--sub); font-size: 10px; }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 16px;
    right: 16px;
    background: #1A3A50;
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 30px;
    text-align: center;
    font-size: 13px;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .empty-state { text-align: center; padding: 20px; color: var(--sub); font-size: 12px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>🏠 SmartHome Nita</h1>
      <div class="clock" id="clockEl">--:--</div>
      <div class="clock-date" id="dateEl">--</div>
    </div>
    <div class="conn-badge" onclick="testConnection()">
      <span class="conn-dot connecting" id="connDot"></span>
      <span id="connText">Menghubungkan...</span>
    </div>
  </div>
</div>

<div class="section">
  <div class="section-title">🎮 Kontrol Perangkat</div>
  <div class="relay-grid" id="relayGrid"></div>
</div>

<div class="section">
  <div class="section-title">⏰ Penjadwalan Otomatis</div>
  <div id="scheduleList" class="schedule-list"></div>
  <div class="add-schedule">
    <div class="schedule-form-row">
      <input type="time" id="scheduleTime" step="60">
      <select id="scheduleAction">
        <option value="ON">🔛 ON</option>
        <option value="OFF">🔴 OFF</option>
      </select>
    </div>
    <div class="schedule-device-select" id="scheduleDevices">
      <label><input type="checkbox" value="0"> ❄️ Kipas</label>
      <label><input type="checkbox" value="1"> 📺 TV</label>
      <label><input type="checkbox" value="2"> 📱 Charger</label>
      <label><input type="checkbox" value="3"> 💡 Lampu</label>
    </div>
    <div class="repeat-option">
      <label><input type="checkbox" id="scheduleRepeat"> 🔄 Jadwal berulang setiap hari</label>
    </div>
    <button class="btn-add-schedule" onclick="addSchedule()">➕ Tambah Jadwal</button>
  </div>
</div>

<div class="section">
  <div class="section-title">📋 Log Aktivitas</div>
  <div id="logContainer"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== KONFIGURASI =====
const MQTT_HOST = "2dce4d575dbb4cd0b98e0dfddf167d78.s1.eu.hivemq.cloud";
const MQTT_PORT = 8884;
const MQTT_USER = "esp32rumah";
const MQTT_PASS = "Nita1816";

const TOPIC_STATUS = "smarthome/nita/status";
const TOPIC_CONTROL = "smarthome/nita/control";
const TOPIC_LOG = "smarthome/nita/log";

// ===== DATA =====
const relayNames = ["Kipas Angin", "TV", "Charger HP", "Lampu"];
const relayIcons = ["❄️", "📺", "📱", "💡"];
let relayState = [false, false, false, false];
let relayTimer = [0, 0, 0, 0];
let timerIntervals = [null, null, null, null];
let logs = [];
let client = null;
let schedules = [];

// ===== FUNGSI UI =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.opacity = '1';
  setTimeout(() => toast.style.opacity = '0', 2000);
}

function addLog(message, source) {
  const now = new Date();
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  logs.unshift({ message, source, time: timeStr });
  if (logs.length > 20) logs.pop();
  
  const container = document.getElementById('logContainer');
  if (logs.length === 0) {
    container.innerHTML = '<div class="empty-state">📭 Belum ada aktivitas</div>';
  } else {
    container.innerHTML = logs.slice(0, 15).map(l => `
      <div class="log-item">
        <div class="log-msg">📌 ${l.message}</div>
        <div class="log-meta">👤 ${l.source} · ⏱️ ${l.time}</div>
      </div>
    `).join('');
  }
}

function renderRelayGrid() {
  const grid = document.getElementById('relayGrid');
  grid.innerHTML = relayNames.map((name, i) => `
    <div class="relay-card ${relayState[i] ? 'active' : 'off'}" id="card${i}">
      <div class="relay-icon" id="icon${i}">${relayIcons[i]}</div>
      <div class="relay-name">${name}</div>
      <div class="relay-status ${relayState[i] ? 'on' : 'off'}" id="rstatus${i}">
        ${relayState[i] ? '● ON' : '○ OFF'}
      </div>
      <div class="btn-group">
        <button class="btn-on" onclick="sendCmd('CH${i}:ON')">🔛 ON</button>
        <button class="btn-off" onclick="sendCmd('CH${i}:OFF')">🔴 OFF</button>
      </div>
      <div class="timer-row">
        <input id="timerInput${i}" type="number" placeholder="Menit" min="1" max="999">
        <button class="btn-timer" onclick="sendTimer(${i})">⏱ Set Timer</button>
      </div>
      <div class="timer-countdown" id="countdown${i}"></div>
    </div>
  `).join('');
}

// ===== FUNGSI UPDATE UI - INI YANG PALING PENTING! =====
function updateRelayUI(i, state, timerSec) {
  console.log(`🔄 UPDATE RELAY ${i}: state=${state}, timer=${timerSec}`);
  
  // Update state
  const oldState = relayState[i];
  relayState[i] = state;
  relayTimer[i] = timerSec;
  
  // Update card border
  const card = document.getElementById(`card${i}`);
  if (card) {
    if (state) {
      card.classList.add('active');
      card.classList.remove('off');
    } else {
      card.classList.remove('active');
      card.classList.add('off');
    }
  }
  
  // Update status text
  const statusEl = document.getElementById(`rstatus${i}`);
  if (statusEl) {
    statusEl.className = `relay-status ${state ? 'on' : 'off'}`;
    statusEl.textContent = state ? '● ON' : '○ OFF';
  }
  
  // Animasi icon jika baru menyala
  const iconEl = document.getElementById(`icon${i}`);
  if (state && !oldState && iconEl) {
    iconEl.classList.add('animate');
    setTimeout(() => iconEl.classList.remove('animate'), 300);
  }
  
  // Handle timer countdown
  if (timerIntervals[i]) {
    clearInterval(timerIntervals[i]);
    timerIntervals[i] = null;
  }
  
  const countdownEl = document.getElementById(`countdown${i}`);
  if (timerSec > 0 && countdownEl) {
    let remaining = timerSec;
    const updateTimer = () => {
      if (remaining <= 0) {
        countdownEl.textContent = '';
        if (timerIntervals[i]) {
          clearInterval(timerIntervals[i]);
          timerIntervals[i] = null;
        }
      } else {
        const m = Math.floor(remaining / 60);
        const s = remaining % 60;
        countdownEl.textContent = `⏱️ Timer: ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        remaining--;
      }
    };
    updateTimer();
    timerIntervals[i] = setInterval(updateTimer, 1000);
  } else if (countdownEl) {
    countdownEl.textContent = '';
  }
  
  // Update log untuk debugging
  addLog(`Status ${relayNames[i]} ${state ? 'ON' : 'OFF'}${timerSec > 0 ? ` (Timer ${Math.floor(timerSec/60)} menit)` : ''}`, "Dashboard");
}

function sendCmd(cmd, showNotif = true) {
  if (!client || !client.connected) {
    showToast('⚠️ Tidak terhubung ke broker');
    return;
  }
  client.publish(TOPIC_CONTROL, cmd);
  if (showNotif) {
    showToast('📤 Perintah dikirim: ' + cmd);
  }
}

function sendTimer(i) {
  const input = document.getElementById(`timerInput${i}`);
  const minutes = parseInt(input.value);
  if (!minutes || minutes <= 0) {
    showToast('Masukkan menit yang valid (1-999)');
    return;
  }
  sendCmd(`CH${i}:TIMER:${minutes}`);
  input.value = '';
  showToast(`⏱️ Timer ${minutes} menit untuk ${relayNames[i]}`);
}

// ===== FUNGSI JADWAL =====
function loadSchedules() {
  const saved = localStorage.getItem('smarthome_schedules_v3');
  if (saved) {
    schedules = JSON.parse(saved);
  }
  renderSchedules();
}

function saveSchedules() {
  localStorage.setItem('smarthome_schedules_v3', JSON.stringify(schedules));
  renderSchedules();
}

function renderSchedules() {
  const container = document.getElementById('scheduleList');
  if (schedules.length === 0) {
    container.innerHTML = '<div class="empty-state">📭 Belum ada jadwal. Tambahkan jadwal di atas!</div>';
    return;
  }
  container.innerHTML = schedules.map(schedule => `
    <div class="schedule-item">
      <div>
        <div class="schedule-time">
          ⏰ ${schedule.time} 
          ${schedule.action === 'ON' ? '🔛 NYALAKAN' : '🔴 MATIKAN'}
          ${schedule.repeat ? '🔄 Berulang' : '📅 Sekali'}
        </div>
        <div class="schedule-details">
          📱 Perangkat: ${schedule.devices.map(d => relayNames[d]).join(', ')}
        </div>
      </div>
      <button class="btn-delete-schedule" onclick="deleteSchedule(${schedule.id})">🗑️ Hapus</button>
    </div>
  `).join('');
}

function deleteSchedule(id) {
  schedules = schedules.filter(s => s.id !== id);
  saveSchedules();
  showToast('🗑️ Jadwal dihapus');
}

function addSchedule() {
  const timeInput = document.getElementById('scheduleTime');
  const action = document.getElementById('scheduleAction').value;
  const checkboxes = document.querySelectorAll('#scheduleDevices input:checked');
  const repeat = document.getElementById('scheduleRepeat').checked;
  
  if (!timeInput.value) {
    showToast('❌ Pilih waktu terlebih dahulu');
    return;
  }
  if (checkboxes.length === 0) {
    showToast('❌ Pilih minimal satu perangkat');
    return;
  }
  
  const devices = Array.from(checkboxes).map(cb => parseInt(cb.value));
  const newSchedule = {
    id: Date.now(),
    time: timeInput.value,
    action: action,
    devices: devices,
    repeat: repeat
  };
  
  schedules.push(newSchedule);
  saveSchedules();
  
  timeInput.value = '';
  checkboxes.forEach(cb => cb.checked = false);
  document.getElementById('scheduleRepeat').checked = false;
  
  showToast(`✅ Jadwal ditambahkan: ${action} pukul ${newSchedule.time}${repeat ? ' (Berulang)' : ''}`);
}

function checkAndExecuteSchedules() {
  const now = new Date();
  const currentTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  
  console.log(`🔍 Cek jadwal: ${currentTime}, total jadwal: ${schedules.length}`);
  
  schedules.forEach(schedule => {
    if (schedule.time === currentTime) {
      console.log(`✅ Eksekusi jadwal: ${schedule.action} untuk ${schedule.devices}`);
      schedule.devices.forEach(deviceId => {
        const cmd = `CH${deviceId}:${schedule.action}`;
        sendCmd(cmd, false);
        addLog(`[JADWAL] ${relayNames[deviceId]} ${schedule.action === 'ON' ? 'dinyalakan' : 'dimatikan'} (Jadwal: ${schedule.time})`, "Sistem");
      });
    }
  });
}

// ===== FUNGSI MQTT =====
function setConnStatus(status) {
  const dot = document.getElementById('connDot');
  const text = document.getElementById('connText');
  dot.className = `conn-dot ${status}`;
  if (status === 'online') {
    text.textContent = 'Terhubung';
  } else if (status === 'offline') {
    text.textContent = 'Terputus';
  } else {
    text.textContent = 'Menghubungkan...';
  }
}

function testConnection() {
  if (client && client.connected) {
    showToast('✅ Koneksi MQTT sehat');
  } else {
    showToast('⚠️ Koneksi terputus, mencoba reconnect...');
    connectMQTT();
  }
}

function connectMQTT() {
  setConnStatus('connecting');
  const url = `wss://${MQTT_HOST}:${MQTT_PORT}/mqtt`;
  console.log(`🔌 Connecting to: ${url}`);
  
  client = mqtt.connect(url, {
    clientId: 'WebDash-' + Math.random().toString(16).substr(2, 8),
    username: MQTT_USER,
    password: MQTT_PASS,
    reconnectPeriod: 4000,
    connectTimeout: 10000,
  });
  
  client.on('connect', () => {
    console.log('✅ MQTT Connected!');
    setConnStatus('online');
    showToast('✅ Terhubung ke HiveMQ Cloud');
    client.subscribe(TOPIC_STATUS, (err) => {
      if (err) console.error('Subscribe error:', err);
      else console.log(`✅ Subscribe ke ${TOPIC_STATUS} berhasil`);
    });
    client.subscribe(TOPIC_LOG, (err) => {
      if (err) console.error('Subscribe error:', err);
      else console.log(`✅ Subscribe ke ${TOPIC_LOG} berhasil`);
    });
  });
  
  // INI YANG PALING PENTING - CALLBACK MESSAGE
  client.on('message', (topic, payload) => {
    const msg = payload.toString();
    console.log(`📩 MQTT Message received: topic=${topic}, payload=${msg.substring(0, 200)}`);
    
    try {
      const data = JSON.parse(msg);
      
      if (topic === TOPIC_STATUS) {
        console.log(`📊 Status update:`, data);
        if (data.relays && Array.isArray(data.relays)) {
          data.relays.forEach((r, i) => {
            if (i < 4) {
              const state = r.state === true || r.state === 1 || r.state === "1";
              const timer = r.timer || 0;
              updateRelayUI(i, state, timer);
            }
          });
        }
      }
      
      if (topic === TOPIC_LOG) {
        console.log(`📋 Log:`, data);
        if (data.message) {
          addLog(data.message, data.source || 'ESP32');
        }
      }
    } catch(e) {
      console.warn('⚠️ Parse JSON error:', e.message);
      console.warn('Raw message:', msg);
    }
  });
  
  client.on('offline', () => {
    console.log('⚠️ MQTT Offline');
    setConnStatus('offline');
  });
  
  client.on('error', (err) => {
    console.error('❌ MQTT Error:', err);
    setConnStatus('offline');
  });
  
  client.on('reconnect', () => {
    console.log('🔄 MQTT Reconnecting...');
    setConnStatus('connecting');
  });
}

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  document.getElementById('clockEl').textContent = 
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  document.getElementById('dateEl').textContent = 
    days[now.getDay()] + ', ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
}

// ===== INIT =====
renderRelayGrid();
loadSchedules();
connectMQTT();
setInterval(updateClock, 1000);
updateClock();
setInterval(checkAndExecuteSchedules, 30000); // Cek setiap 30 detik
</script>
</body>
</html>
