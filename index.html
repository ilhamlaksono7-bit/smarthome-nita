<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SmartHome Nita - Test</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.4/mqtt.min.js"></script>
<style>
  body {
    font-family: Arial;
    background: #0B1E2D;
    color: white;
    padding: 20px;
  }
  button {
    padding: 10px 20px;
    margin: 5px;
    font-size: 16px;
    cursor: pointer;
  }
  .relay {
    background: #112B3C;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
  }
  .status {
    display: inline-block;
    padding: 5px 10px;
    border-radius: 5px;
    margin-left: 10px;
  }
  .on { background: green; }
  .off { background: red; }
</style>
</head>
<body>
<h1>🏠 SmartHome Nita - Test Mode</h1>
<div id="status-mqtt">Menghubungkan...</div>
<hr>

<div id="relays"></div>

<div id="log" style="margin-top:20px; background:#0F2437; padding:10px; border-radius:10px;"></div>

<script>
const MQTT_HOST = "2dce4d575dbb4cd0b98e0dfddf167d78.s1.eu.hivemq.cloud";
const MQTT_PORT = 8884;
const MQTT_USER = "esp32rumah";
const MQTT_PASS = "Nita1816";

const TOPIC_CONTROL = "smarthome/nita/control";
const TOPIC_STATUS = "smarthome/nita/status";

const relayNames = ["Kipas Angin", "TV", "Charger HP", "Lampu"];
let relayState = [false, false, false, false];
let client = null;

function addLog(msg) {
  const logDiv = document.getElementById('log');
  const time = new Date().toLocaleTimeString();
  logDiv.innerHTML = `<div>[${time}] ${msg}</div>` + logDiv.innerHTML;
  if (logDiv.children.length > 10) logDiv.removeChild(logDiv.lastChild);
}

function renderRelays() {
  const container = document.getElementById('relays');
  container.innerHTML = relayNames.map((name, i) => `
    <div class="relay">
      <strong>${name}</strong>
      <span class="status ${relayState[i] ? 'on' : 'off'}">${relayState[i] ? 'ON' : 'OFF'}</span>
      <br>
      <button onclick="sendCmd('CH${i}:ON')">🔛 ON</button>
      <button onclick="sendCmd('CH${i}:OFF')">🔴 OFF</button>
      <button onclick="sendCmd('CH${i}:TIMER:5')">⏱ Timer 5 menit</button>
    </div>
  `).join('');
}

function sendCmd(cmd) {
  if (!client || !client.connected) {
    addLog('❌ Tidak terhubung ke MQTT!');
    return;
  }
  client.publish(TOPIC_CONTROL, cmd);
  addLog(`📤 Perintah dikirim: ${cmd}`);
}

function connectMQTT() {
  const url = `wss://${MQTT_HOST}:${MQTT_PORT}/mqtt`;
  addLog(`🔄 Menghubungkan ke ${MQTT_HOST}...`);
  
  client = mqtt.connect(url, {
    clientId: 'TestDash-' + Math.random().toString(16).substr(2, 8),
    username: MQTT_USER,
    password: MQTT_PASS,
  });
  
  client.on('connect', () => {
    addLog('✅ MQTT Terhubung!');
    document.getElementById('status-mqtt').innerHTML = '✅ Terhubung ke HiveMQ';
    client.subscribe(TOPIC_STATUS);
  });
  
  client.on('message', (topic, msg) => {
    const pesan = msg.toString();
    addLog(`📩 Terima dari ${topic}: ${pesan.substring(0, 100)}`);
    
    try {
      const data = JSON.parse(pesan);
      if (data.relays) {
        data.relays.forEach((r, i) => {
          relayState[i] = r.state;
        });
        renderRelays();
        addLog(`✅ Status relay diupdate: ${relayState.map(s => s ? 'ON' : 'OFF').join(', ')}`);
      }
    } catch(e) {
      addLog(`⚠️ Gagal parse JSON: ${e.message}`);
    }
  });
  
  client.on('error', (err) => {
    addLog(`❌ MQTT Error: ${err.message}`);
  });
  
  client.on('offline', () => {
    addLog('⚠️ MQTT Offline');
  });
}

renderRelays();
connectMQTT();
</script>
</body>
</html>
